{% extends 'base.html' %}{% block content %}<section class="card"><h2>Адмінка</h2><form method="post" action="/admin/new" enctype="multipart/form-data"><input name="title" placeholder="Назва гри" value="Гра Варіанти"><label class="fileLabel">Аватарка ведучої<input type="file" name="host_avatar" accept="image/*"></label><input name="host_avatar_text" placeholder="Або емодзі для ведучої, якщо без фото"><button>Створити нову гру</button></form></section>{% if game %}<section class="card"><h2>Поточна гра</h2><p><b>{{game.title}}</b></p><a class="button" href="/admin/game/{{game.id}}">Відкрити гру</a></section>{% endif %}<section class="card"><h2>Історія ігор</h2>{% for g in history %}<a class="history" href="/admin/game/{{g.id}}"><span>{{g.title}}</span><span>{{g.status}} · {{g.created_at}}</span></a>{% else %}<p class="muted">Ігор ще немає.</p>{% endfor %}</section>{% endblock %}
